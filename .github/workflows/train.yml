name: Distributed Train on Mac Minis

on:
  push:
    branches: ["**"]
    paths:
      - "train_gpt_mlx.py"
      - "data/**"
      - "cluster/**"
      - ".github/workflows/train.yml"
  workflow_dispatch:
    inputs:
      iterations:
        description: "Number of training iterations"
        default: "200"
      train_batch_tokens:
        description: "Training batch tokens"
        default: "8192"
      run_id:
        description: "Run identifier"
        default: "ci_run"

jobs:
  distributed-train:
    # Runs on ONE self-hosted runner (the coordinator). It launches
    # mlx.launch across ALL hosts listed in cluster/hostfile.json.
    runs-on: [self-hosted, parameter-golf]
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set paths
        run: |
          echo "WORK_DIR=$HOME/parameter-golf-work" >> $GITHUB_ENV
          echo "VENV_DIR=$HOME/parameter-golf-venv" >> $GITHUB_ENV
          echo "DATA_DIR=$HOME/parameter-golf-data" >> $GITHUB_ENV

      - name: Ensure venv
        run: |
          if [ ! -d "$VENV_DIR" ]; then
            python3 -m venv "$VENV_DIR"
            source "$VENV_DIR/bin/activate"
            pip install --upgrade pip
            pip install mlx numpy sentencepiece huggingface-hub datasets tqdm
          fi
          source "$VENV_DIR/bin/activate"
          python3 -c "import mlx" || {
            pip install mlx numpy sentencepiece huggingface-hub datasets tqdm
          }

      - name: Sync code and data to all hosts
        run: |
          source "$VENV_DIR/bin/activate"
          HOSTFILE="cluster/hostfile.json"
          if [ ! -f "$HOSTFILE" ]; then
            echo "ERROR: cluster/hostfile.json not found."
            exit 1
          fi

          # Extract ssh targets (user@ip) from hostfile.json
          SSH_TARGETS=$(python3 -c "
          import json
          with open('$HOSTFILE') as f:
              hosts = json.load(f)
          for h in hosts:
              print(h['ssh'])
          ")

          CHECKOUT_DIR="$(pwd)"

          # Remote paths use ~ so they expand to each remote user's home
          R_WORK=parameter-golf-work
          R_VENV=parameter-golf-venv
          R_DATA=parameter-golf-data

          for TARGET in $SSH_TARGETS; do
            echo "--- Syncing to $TARGET ---"

            # Sync the code checkout
            ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 "$TARGET" "mkdir -p ~/$R_WORK"
            rsync -az --delete \
              --exclude '.git' --exclude '.venv' --exclude 'data/datasets' --exclude 'data/tokenizers' --exclude 'logs' \
              -e "ssh -o StrictHostKeyChecking=no" \
              "$CHECKOUT_DIR/" "$TARGET:~/$R_WORK/"

            # Ensure venv + dataset on remote
            ssh -o StrictHostKeyChecking=no "$TARGET" '
              R_WORK=~/parameter-golf-work
              R_VENV=~/parameter-golf-venv
              R_DATA=~/parameter-golf-data

              # Venv
              if [ ! -d $R_VENV ]; then
                python3 -m venv $R_VENV
                source $R_VENV/bin/activate
                pip install --upgrade pip
                pip install mlx numpy sentencepiece huggingface-hub datasets tqdm
              fi
              source $R_VENV/bin/activate

              # Dataset
              if [ ! -d $R_DATA/fineweb10B_sp1024 ]; then
                cd $R_WORK
                python3 data/cached_challenge_fineweb.py --variant sp1024 --train-shards 10
                mkdir -p $R_DATA
                mv ./data/datasets/fineweb10B_sp1024 $R_DATA/
                cp -r ./data/tokenizers $R_DATA/ 2>/dev/null || true
              fi

              # Symlink data into work dir
              mkdir -p $R_WORK/data/datasets
              ln -sfn $R_DATA/fineweb10B_sp1024 $R_WORK/data/datasets/fineweb10B_sp1024
              if [ -d $R_DATA/tokenizers ]; then
                ln -sfn $R_DATA/tokenizers $R_WORK/data/tokenizers
              fi
            '
            echo "--- $TARGET ready ---"
          done

          # Also symlink data locally for the coordinator
          mkdir -p "$WORK_DIR/data/datasets"
          if [ ! -d "$DATA_DIR/fineweb10B_sp1024" ]; then
            python3 data/cached_challenge_fineweb.py --variant sp1024 --train-shards 10
            mkdir -p "$DATA_DIR"
            mv ./data/datasets/fineweb10B_sp1024 "$DATA_DIR/"
            cp -r ./data/tokenizers "$DATA_DIR/" 2>/dev/null || true
          fi
          ln -sfn "$DATA_DIR/fineweb10B_sp1024" "$WORK_DIR/data/datasets/fineweb10B_sp1024"
          if [ -d "$DATA_DIR/tokenizers" ]; then
            ln -sfn "$DATA_DIR/tokenizers" "$WORK_DIR/data/tokenizers"
          fi

      - name: Distributed train
        run: |
          source "$VENV_DIR/bin/activate"

          NUM_HOSTS=$(python3 -c "import json; print(len(json.load(open('cluster/hostfile.json'))))")
          echo "Launching distributed training across $NUM_HOSTS hosts"

          # Copy hostfile to work dir so mlx.launch can find it
          cp cluster/hostfile.json "$WORK_DIR/hostfile.json"

          # mlx.launch SSHes to each host and runs the script there.
          # Env vars and script path must work on all machines, so use
          # ~/parameter-golf-work which each machine has under its own $HOME.
          RUN_ID="${{ inputs.run_id || github.sha }}" \
          ITERATIONS="${{ inputs.iterations || '200' }}" \
          TRAIN_BATCH_TOKENS="${{ inputs.train_batch_tokens || '8192' }}" \
          VAL_LOSS_EVERY=0 \
          VAL_BATCH_SIZE=8192 \
          DATA_PATH="$HOME/parameter-golf-work/data/datasets/fineweb10B_sp1024" \
          TOKENIZER_PATH="$HOME/parameter-golf-work/data/tokenizers/fineweb_1024_bpe.model" \
          OUT_DIR="$HOME/parameter-golf-work/logs" \
          python3 -m mlx.launch \
            --hostfile "$WORK_DIR/hostfile.json" \
            --backend ring \
            "$WORK_DIR/train_gpt_mlx.py" 2>&1 | tee train_log.txt

      - name: Collect results
        if: always()
        run: |
          cp -r ~/parameter-golf-work/logs/ ./logs/ 2>/dev/null || true

      - name: Upload training log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: train-log-distributed-${{ github.sha }}
          path: |
            train_log.txt
            logs/

      - name: Print summary
        if: always()
        run: |
          NUM_HOSTS=$(python3 -c "import json; print(len(json.load(open('cluster/hostfile.json'))))" 2>/dev/null || echo "?")
          echo "## Distributed Training Results ($NUM_HOSTS hosts)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -30 train_log.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No log output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
