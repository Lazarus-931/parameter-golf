name: Distributed Train on Mac Minis

on:
  push:
    branches: ["**"]
    paths:
      - "train_gpt_mlx.py"
      - "data/**"
      - "cluster/**"
      - ".github/workflows/train.yml"
  workflow_dispatch:
    inputs:
      iterations:
        description: "Number of training iterations"
        default: "200"
      train_batch_tokens:
        description: "Training batch tokens"
        default: "8192"
      run_id:
        description: "Run identifier"
        default: "ci_run"

jobs:
  distributed-train:
    # Runs on ONE self-hosted runner (the coordinator). It launches
    # mlx.launch across ALL hosts listed in cluster/hosts.txt.
    runs-on: [self-hosted, parameter-golf]
    timeout-minutes: 120

    env:
      WORK_DIR: ~/parameter-golf-work
      VENV_DIR: ~/parameter-golf-venv
      DATA_DIR: ~/parameter-golf-data

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ensure venv
        run: |
          if [ ! -d "$VENV_DIR" ]; then
            python3 -m venv "$VENV_DIR"
            source "$VENV_DIR/bin/activate"
            pip install --upgrade pip
            pip install mlx numpy sentencepiece huggingface-hub datasets tqdm
          fi
          source "$VENV_DIR/bin/activate"
          python3 -c "import mlx" || {
            pip install mlx numpy sentencepiece huggingface-hub datasets tqdm
          }

      - name: Ensure dataset cached
        run: |
          source "$VENV_DIR/bin/activate"
          if [ ! -d "$DATA_DIR/fineweb10B_sp1024" ]; then
            python3 data/cached_challenge_fineweb.py --variant sp1024 --train-shards 10
            mkdir -p "$DATA_DIR"
            mv ./data/datasets/fineweb10B_sp1024 "$DATA_DIR/"
            cp -r ./data/tokenizers "$DATA_DIR/" 2>/dev/null || true
          fi

      - name: Sync code and data to all hosts
        run: |
          HOSTS_FILE="cluster/hosts.txt"
          if [ ! -f "$HOSTS_FILE" ]; then
            echo "ERROR: cluster/hosts.txt not found. Add your Mac Mini Tailscale IPs there."
            exit 1
          fi

          # Read hosts (skip comments and blanks)
          HOSTS=$(grep -v '^\s*#' "$HOSTS_FILE" | grep -v '^\s*$' | tr '\n' ' ')
          echo "Cluster hosts: $HOSTS"

          SELF_IP=$(ipconfig getifaddr en0 2>/dev/null || echo "")
          CHECKOUT_DIR="$(pwd)"

          for HOST in $HOSTS; do
            echo "--- Syncing to $HOST ---"
            # Sync the code checkout
            ssh -o StrictHostKeyChecking=no "$HOST" "mkdir -p $WORK_DIR" || true
            rsync -az --delete \
              --exclude '.git' --exclude '.venv' --exclude 'data/datasets' --exclude 'data/tokenizers' --exclude 'logs' \
              "$CHECKOUT_DIR/" "$HOST:$WORK_DIR/"

            # Ensure venv exists on remote
            ssh "$HOST" "
              if [ ! -d $VENV_DIR ]; then
                python3 -m venv $VENV_DIR
                source $VENV_DIR/bin/activate
                pip install --upgrade pip
                pip install mlx numpy sentencepiece huggingface-hub datasets tqdm
              fi
            " || true

            # Ensure dataset cached on remote
            ssh "$HOST" "
              source $VENV_DIR/bin/activate
              if [ ! -d $DATA_DIR/fineweb10B_sp1024 ]; then
                cd $WORK_DIR
                python3 data/cached_challenge_fineweb.py --variant sp1024 --train-shards 10
                mkdir -p $DATA_DIR
                mv ./data/datasets/fineweb10B_sp1024 $DATA_DIR/
                cp -r ./data/tokenizers $DATA_DIR/ 2>/dev/null || true
              fi
              # Symlink data into work dir
              mkdir -p $WORK_DIR/data/datasets
              ln -sfn $DATA_DIR/fineweb10B_sp1024 $WORK_DIR/data/datasets/fineweb10B_sp1024
              if [ -d $DATA_DIR/tokenizers ]; then
                ln -sfn $DATA_DIR/tokenizers $WORK_DIR/data/tokenizers
              fi
            "
          done

          # Also symlink data locally
          mkdir -p ./data/datasets
          ln -sfn "$DATA_DIR/fineweb10B_sp1024" ./data/datasets/fineweb10B_sp1024
          if [ -d "$DATA_DIR/tokenizers" ]; then
            ln -sfn "$DATA_DIR/tokenizers" ./data/tokenizers
          fi

      - name: Distributed train
        run: |
          source "$VENV_DIR/bin/activate"

          # Build comma-separated host list from cluster/hosts.txt
          HOSTS=$(grep -v '^\s*#' cluster/hosts.txt | grep -v '^\s*$' | paste -sd ',' -)
          NUM_HOSTS=$(grep -v '^\s*#' cluster/hosts.txt | grep -v '^\s*$' | wc -l | tr -d ' ')

          echo "Launching distributed training across $NUM_HOSTS hosts: $HOSTS"

          RUN_ID="${{ inputs.run_id || github.sha }}" \
          ITERATIONS="${{ inputs.iterations || '200' }}" \
          TRAIN_BATCH_TOKENS="${{ inputs.train_batch_tokens || '8192' }}" \
          VAL_LOSS_EVERY=0 \
          VAL_BATCH_SIZE=8192 \
          DATA_PATH="$WORK_DIR/data/datasets/fineweb10B_sp1024" \
          TOKENIZER_PATH="$WORK_DIR/data/tokenizers/fineweb_1024_bpe.model" \
          OUT_DIR="$WORK_DIR/logs" \
          python3 -m mlx.launch \
            --hosts "$HOSTS" \
            --backend ring \
            "$WORK_DIR/train_gpt_mlx.py" 2>&1 | tee train_log.txt

      - name: Collect results
        if: always()
        run: |
          # Copy logs from work dir
          cp -r ~/parameter-golf-work/logs/ ./logs/ 2>/dev/null || true

      - name: Upload training log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: train-log-distributed-${{ github.sha }}
          path: |
            train_log.txt
            logs/

      - name: Print summary
        if: always()
        run: |
          HOSTS=$(grep -v '^\s*#' cluster/hosts.txt | grep -v '^\s*$' | wc -l | tr -d ' ')
          echo "## Distributed Training Results ($HOSTS hosts)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -30 train_log.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No log output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
