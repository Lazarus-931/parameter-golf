name: Distributed Train on Mac Minis

on:
  push:
    branches: ["**"]
    paths:
      - "train_gpt_mlx.py"
      - "data/**"
      - "cluster/**"
      - ".github/workflows/train.yml"
  workflow_dispatch:
    inputs:
      iterations:
        description: "Number of training iterations"
        default: "200"
      train_batch_tokens:
        description: "Training batch tokens"
        default: "8192"
      run_id:
        description: "Run identifier"
        default: "ci_run"

# All paths are absolute and identical on every Mac Mini.
# This is required because mlx.launch uses the coordinator's Python
# path on all remote hosts.
env:
  PG_ROOT: /opt/parameter-golf
  PG_VENV: /opt/parameter-golf/venv
  PG_WORK: /opt/parameter-golf/work
  PG_DATA: /opt/parameter-golf/data

jobs:
  distributed-train:
    runs-on: [self-hosted, parameter-golf]
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ensure shared dirs and venv (local)
        run: |
          # Create shared dir if needed (setup-runner.sh should have done this)
          sudo mkdir -p "$PG_ROOT" && sudo chown "$(whoami)" "$PG_ROOT"
          mkdir -p "$PG_WORK" "$PG_DATA"

          # Find python 3.10+
          if command -v /opt/homebrew/bin/python3.12 &>/dev/null; then
            PY=/opt/homebrew/bin/python3.12
          elif command -v python3.12 &>/dev/null; then
            PY=python3.12
          else
            PY=python3
          fi

          if [ ! -d "$PG_VENV" ]; then
            $PY -m venv "$PG_VENV"
          fi
          source "$PG_VENV/bin/activate"
          pip install --upgrade pip
          pip install --upgrade mlx numpy sentencepiece huggingface-hub datasets tqdm
          echo "Python: $(python3 --version)"
          echo "MLX: $(python3 -c 'import mlx.core as mx; print(mx.__version__)' 2>/dev/null || echo 'unknown')"
          which mlx.launch

      - name: Sync code and data to all hosts
        run: |
          source "$PG_VENV/bin/activate"
          HOSTFILE="cluster/hostfile.json"

          SSH_TARGETS=$(python3 -c "
          import json
          with open('$HOSTFILE') as f:
              hosts = json.load(f)
          for h in hosts:
              print(h['ssh'])
          ")

          CHECKOUT_DIR="$(pwd)"

          for TARGET in $SSH_TARGETS; do
            echo "--- Syncing to $TARGET ---"

            # Create shared dirs on remote (needs sudo the first time)
            ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 "$TARGET" \
              "sudo mkdir -p /opt/parameter-golf && sudo chown \$(whoami) /opt/parameter-golf && mkdir -p /opt/parameter-golf/work /opt/parameter-golf/data"

            # Sync code
            rsync -az --delete \
              --exclude '.git' --exclude '.venv' --exclude 'data/datasets' --exclude 'data/tokenizers' --exclude 'logs' \
              -e "ssh -o StrictHostKeyChecking=no" \
              "$CHECKOUT_DIR/" "$TARGET:/opt/parameter-golf/work/"

            # Ensure venv + dataset on remote
            ssh -o StrictHostKeyChecking=no "$TARGET" '
              PG=/opt/parameter-golf

              # Find python 3.10+
              if command -v /opt/homebrew/bin/python3.12 &>/dev/null; then
                PY=/opt/homebrew/bin/python3.12
              elif command -v python3.12 &>/dev/null; then
                PY=python3.12
              else
                PY=python3
              fi

              # Venv at shared path
              if [ ! -d $PG/venv ]; then
                $PY -m venv $PG/venv
                source $PG/venv/bin/activate
                pip install --upgrade pip
                pip install mlx numpy sentencepiece huggingface-hub datasets tqdm
              fi
              source $PG/venv/bin/activate

              # Dataset
              if [ ! -d $PG/data/fineweb10B_sp1024 ]; then
                cd $PG/work
                python3 data/cached_challenge_fineweb.py --variant sp1024 --train-shards 10
                mv ./data/datasets/fineweb10B_sp1024 $PG/data/
                cp -r ./data/tokenizers $PG/data/ 2>/dev/null || true
              fi

              # Symlink data into work dir
              mkdir -p $PG/work/data/datasets
              ln -sfn $PG/data/fineweb10B_sp1024 $PG/work/data/datasets/fineweb10B_sp1024
              if [ -d $PG/data/tokenizers ]; then
                ln -sfn $PG/data/tokenizers $PG/work/data/tokenizers
              fi
            '
            echo "--- $TARGET ready ---"
          done

          # Symlink data locally
          mkdir -p "$PG_WORK/data/datasets"
          if [ ! -d "$PG_DATA/fineweb10B_sp1024" ]; then
            cd "$PG_WORK"
            python3 data/cached_challenge_fineweb.py --variant sp1024 --train-shards 10
            mv ./data/datasets/fineweb10B_sp1024 "$PG_DATA/"
            cp -r ./data/tokenizers "$PG_DATA/" 2>/dev/null || true
            cd "$CHECKOUT_DIR"
          fi
          ln -sfn "$PG_DATA/fineweb10B_sp1024" "$PG_WORK/data/datasets/fineweb10B_sp1024"
          if [ -d "$PG_DATA/tokenizers" ]; then
            ln -sfn "$PG_DATA/tokenizers" "$PG_WORK/data/tokenizers"
          fi

      - name: Distributed train
        run: |
          source "$PG_VENV/bin/activate"

          NUM_HOSTS=$(python3 -c "import json; print(len(json.load(open('cluster/hostfile.json'))))")
          echo "Launching distributed training across $NUM_HOSTS hosts"

          cp cluster/hostfile.json "$PG_WORK/hostfile.json"

          # All paths are /opt/parameter-golf/... — identical on every host
          RUN_ID="${{ inputs.run_id || github.sha }}" \
          ITERATIONS="${{ inputs.iterations || '200' }}" \
          TRAIN_BATCH_TOKENS="${{ inputs.train_batch_tokens || '8192' }}" \
          VAL_LOSS_EVERY=0 \
          VAL_BATCH_SIZE=8192 \
          DATA_PATH="/opt/parameter-golf/work/data/datasets/fineweb10B_sp1024" \
          TOKENIZER_PATH="/opt/parameter-golf/work/data/tokenizers/fineweb_1024_bpe.model" \
          OUT_DIR="/opt/parameter-golf/work/logs" \
          mlx.launch \
            --hostfile "$PG_WORK/hostfile.json" \
            --backend ring \
            --verbose \
            "$PG_WORK/train_gpt_mlx.py" 2>&1 | tee train_log.txt

      - name: Collect results
        if: always()
        run: |
          cp -r /opt/parameter-golf/work/logs/ ./logs/ 2>/dev/null || true

      - name: Upload training log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: train-log-distributed-${{ github.sha }}
          path: |
            train_log.txt
            logs/

      - name: Print summary
        if: always()
        run: |
          NUM_HOSTS=$(python3 -c "import json; print(len(json.load(open('cluster/hostfile.json'))))" 2>/dev/null || echo "?")
          echo "## Distributed Training Results ($NUM_HOSTS hosts)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          tail -30 train_log.txt >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "No log output" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
