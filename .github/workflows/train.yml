name: Distributed Train on Mac Minis

on:
  push:
    branches: ["**"]
    paths:
      - "train_gpt_mlx.py"
      - "data/**"
      - "cluster/**"
      - ".github/workflows/train.yml"
  workflow_dispatch:
    inputs:
      iterations:
        description: "Number of training iterations"
        default: "200"
      train_batch_tokens:
        description: "Training batch tokens"
        default: "8192"
      run_id:
        description: "Run identifier"
        default: "ci_run"
      profile_steps:
        description: "Metal GPU trace: capture N training steps (0 = off)"
        default: "0"

# All paths are absolute and identical on every Mac Mini.
# This is required because mlx.launch uses the coordinator's Python
# path on all remote hosts.
env:
  PG_ROOT: /opt/parameter-golf
  PG_VENV: /opt/parameter-golf/venv
  PG_WORK: /opt/parameter-golf/work
  PG_DATA: /opt/parameter-golf/data

jobs:
  distributed-train:
    runs-on: [self-hosted, parameter-golf]
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Ensure shared dirs and venv (local)
        run: |
          # Create shared dir if needed (setup-runner.sh should have done this)
          sudo mkdir -p "$PG_ROOT" && sudo chown "$(whoami)" "$PG_ROOT"
          mkdir -p "$PG_WORK" "$PG_DATA"

          # Find python 3.10+
          if command -v /opt/homebrew/bin/python3.12 &>/dev/null; then
            PY=/opt/homebrew/bin/python3.12
          elif command -v python3.12 &>/dev/null; then
            PY=python3.12
          else
            PY=python3
          fi

          if [ ! -d "$PG_VENV" ]; then
            $PY -m venv "$PG_VENV"
          fi
          source "$PG_VENV/bin/activate"
          pip install --upgrade pip
          pip install --upgrade mlx numpy sentencepiece huggingface-hub datasets tqdm
          echo "Python: $(python3 --version)"
          echo "MLX: $(python3 -c 'import mlx.core as mx; print(mx.__version__)' 2>/dev/null || echo 'unknown')"
          which mlx.launch

      - name: Sync code and data to all hosts
        run: |
          source "$PG_VENV/bin/activate"
          HOSTFILE="cluster/hostfile.json"

          SSH_TARGETS=$(python3 -c "
          import json
          with open('$HOSTFILE') as f:
              hosts = json.load(f)
          for h in hosts:
              print(h['ssh'])
          ")

          CHECKOUT_DIR="$(pwd)"

          for TARGET in $SSH_TARGETS; do
            echo "--- Syncing to $TARGET ---"

            # Create shared dirs on remote (needs sudo the first time)
            ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 "$TARGET" \
              "sudo mkdir -p /opt/parameter-golf && sudo chown \$(whoami) /opt/parameter-golf && mkdir -p /opt/parameter-golf/work /opt/parameter-golf/data"

            # Sync code
            rsync -az --delete \
              --exclude '.git' --exclude '.venv' --exclude 'data/datasets' --exclude 'data/tokenizers' --exclude 'logs' \
              -e "ssh -o StrictHostKeyChecking=no" \
              "$CHECKOUT_DIR/" "$TARGET:/opt/parameter-golf/work/"

            # Ensure venv + dataset on remote
            ssh -o StrictHostKeyChecking=no "$TARGET" '
              PG=/opt/parameter-golf

              # Find python 3.10+
              if command -v /opt/homebrew/bin/python3.12 &>/dev/null; then
                PY=/opt/homebrew/bin/python3.12
              elif command -v python3.12 &>/dev/null; then
                PY=python3.12
              else
                PY=python3
              fi

              # Venv at shared path
              if [ ! -d $PG/venv ]; then
                $PY -m venv $PG/venv
                source $PG/venv/bin/activate
                pip install --upgrade pip
                pip install mlx numpy sentencepiece huggingface-hub datasets tqdm
              fi
              source $PG/venv/bin/activate

              # Dataset
              if [ ! -d $PG/data/fineweb10B_sp1024 ]; then
                cd $PG/work
                python3 data/cached_challenge_fineweb.py --variant sp1024 --train-shards 10
                mv ./data/datasets/fineweb10B_sp1024 $PG/data/
                cp -r ./data/tokenizers $PG/data/ 2>/dev/null || true
              fi

              # Symlink data into work dir
              mkdir -p $PG/work/data/datasets
              ln -sfn $PG/data/fineweb10B_sp1024 $PG/work/data/datasets/fineweb10B_sp1024
              if [ -d $PG/data/tokenizers ]; then
                ln -sfn $PG/data/tokenizers $PG/work/data/tokenizers
              fi
            '
            echo "--- $TARGET ready ---"
          done

          # Sync checked-out code to local work dir (runner may not be in hostfile)
          rsync -a --delete \
            --exclude '.git' --exclude '.venv' --exclude 'data/datasets' --exclude 'data/tokenizers' --exclude 'logs' \
            "$CHECKOUT_DIR/" "$PG_WORK/"

          # Symlink data locally
          mkdir -p "$PG_WORK/data/datasets"
          if [ ! -d "$PG_DATA/fineweb10B_sp1024" ]; then
            cd "$PG_WORK"
            python3 data/cached_challenge_fineweb.py --variant sp1024 --train-shards 10
            mv ./data/datasets/fineweb10B_sp1024 "$PG_DATA/"
            cp -r ./data/tokenizers "$PG_DATA/" 2>/dev/null || true
            cd "$CHECKOUT_DIR"
          fi
          ln -sfn "$PG_DATA/fineweb10B_sp1024" "$PG_WORK/data/datasets/fineweb10B_sp1024"
          if [ -d "$PG_DATA/tokenizers" ]; then
            ln -sfn "$PG_DATA/tokenizers" "$PG_WORK/data/tokenizers"
          fi

      - name: Distributed train
        env:
          PYTHONUNBUFFERED: "1"
        run: |
          set -o pipefail
          source "$PG_VENV/bin/activate"

          NUM_HOSTS=$(python3 -c "import json; print(len(json.load(open('cluster/hostfile.json'))))")
          echo "Launching distributed training across $NUM_HOSTS hosts"

          cp cluster/hostfile.json "$PG_WORK/hostfile.json"

          RUN_ID="${{ inputs.run_id || github.sha }}"
          ITERATIONS="${{ inputs.iterations || '200' }}"
          BATCH="${{ inputs.train_batch_tokens || '8192' }}"

          PROFILE_STEPS="${{ inputs.profile_steps || '0' }}"

          export RUN_ID ITERATIONS
          export TRAIN_BATCH_TOKENS="$BATCH"
          export VAL_LOSS_EVERY=0
          export VAL_BATCH_SIZE=8192
          export GRAD_ACCUM_STEPS=1
          export MLX_MAX_MICROBATCH_TOKENS=4096
          export PROFILE_STEPS
          export PROFILE_TRACE="$PG_WORK/training.gputrace"

          cd "$PG_WORK"

          if [ "$NUM_HOSTS" -gt 1 ]; then
            # Multi-host: use mlx.launch to coordinate distributed training
            mlx.launch \
              --hostfile "$PG_WORK/hostfile.json" \
              --backend ring \
              --verbose \
              --env "RUN_ID=$RUN_ID" \
              --env "ITERATIONS=$ITERATIONS" \
              --env "TRAIN_BATCH_TOKENS=$BATCH" \
              --env "VAL_LOSS_EVERY=0" \
              --env "VAL_BATCH_SIZE=8192" \
              --env "GRAD_ACCUM_STEPS=1" \
              --env "MLX_MAX_MICROBATCH_TOKENS=4096" \
              "$PG_WORK/train_gpt_mlx.py"
          else
            # Single host: run directly, no mlx.launch overhead
            echo "Single host mode — running directly"
            python3 -u "$PG_WORK/train_gpt_mlx.py"
          fi
          echo "Training script exit code: $?"

      - name: Collect and summarize
        if: always()
        run: |
          sync
          cp -r "$PG_WORK/logs/" ./logs/ 2>/dev/null || true
          LOG=$(ls ./logs/*.txt 2>/dev/null | head -1)

          if [ -z "$LOG" ]; then
            echo "No training log found"
            exit 0
          fi

          echo ""
          echo "========== RESULTS =========="
          # Key metrics: config, final train loss, val_loss, val_bpb, model size
          grep -E "^model_params:|^iterations:|^optimizer:" "$LOG" 2>/dev/null || true
          echo "---"
          grep -E "^step:(1|10)/|^step:.*train_loss.*step_avg" "$LOG" | tail -3
          echo "---"
          grep -E "^step:.*val_loss.*val_bpb" "$LOG" 2>/dev/null || true
          grep -E "^saved_model:|^serialized_model|^final_int8" "$LOG" 2>/dev/null || true
          grep -E "^stopping_early" "$LOG" 2>/dev/null || true
          echo "============================="

          # GitHub step summary
          {
            echo "## Training Results"
            echo '```'
            grep -E "^step:.*val_bpb|^final_int8_zlib_roundtrip " "$LOG" 2>/dev/null || echo "val_bpb not yet available"
            grep -E "^serialized_model" "$LOG" 2>/dev/null || true
            echo ""
            echo "Steps: $(grep -c '^step:' "$LOG") | $(grep '^step:' "$LOG" | tail -1)"
            echo '```'
          } >> $GITHUB_STEP_SUMMARY

      - name: Upload training log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: train-log-${{ github.sha }}
          path: logs/

      - name: Upload GPU trace
        if: always() && inputs.profile_steps != '0' && inputs.profile_steps != ''
        uses: actions/upload-artifact@v4
        with:
          name: gpu-trace-${{ github.sha }}
          path: ${{ env.PG_WORK }}/training.gputrace/

      - name: Cleanup training artifacts
        if: always()
        run: |
          # Remove logs, model files, and traces from the coordinator
          rm -rf "$PG_WORK/logs" "$PG_WORK/hostfile.json" "$PG_WORK/training.gputrace"

          # Remove logs from all remote hosts
          source "$PG_VENV/bin/activate"
          HOSTFILE="cluster/hostfile.json"
          SSH_TARGETS=$(python3 -c "
          import json
          with open('$HOSTFILE') as f:
              hosts = json.load(f)
          for h in hosts:
              print(h['ssh'])
          " 2>/dev/null || true)

          for TARGET in $SSH_TARGETS; do
            ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 "$TARGET" \
              "rm -rf /opt/parameter-golf/work/logs" 2>/dev/null || true
          done
          echo "Cleaned up training artifacts from all hosts"
