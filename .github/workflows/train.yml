name: Train on Mac Mini

on:
  push:
    branches: ["**"]
    paths:
      - "train_gpt_mlx.py"
      - "data/**"
      - "cluster/**"
      - ".github/workflows/train.yml"
  workflow_dispatch:
    inputs:
      iterations:
        description: "Number of training iterations"
        default: "200"
      train_batch_tokens:
        description: "Training batch tokens"
        default: "8192"
      run_id:
        description: "Run identifier"
        default: "ci_run"
      host:
        description: "Target host (derek or lexie). Leave empty for auto-assign."
        default: ""

# ---- KEY RULE: one mini = one run at a time ----
# Host SSH targets are stored in repo secrets (DEREK_SSH, LEXIE_SSH).
# Concurrency groups keyed by host ensure only one run per mini. Others queue.

env:
  PG_ROOT: /opt/parameter-golf
  PG_VENV: /opt/parameter-golf/venv
  PG_WORK: /opt/parameter-golf/work
  PG_DATA: /opt/parameter-golf/data

jobs:
  assign-host:
    runs-on: [self-hosted, parameter-golf]
    outputs:
      host_ssh: ${{ steps.pick.outputs.host_ssh }}
      host_name: ${{ steps.pick.outputs.host_name }}
    steps:
      - name: Pick host
        id: pick
        env:
          DEREK_SSH: ${{ secrets.DEREK_SSH }}
          LEXIE_SSH: ${{ secrets.LEXIE_SSH }}
        run: |
          REQUESTED="${{ inputs.host }}"
          if [ "$REQUESTED" = "derek" ]; then
            echo "host_ssh=$DEREK_SSH" >> $GITHUB_OUTPUT
            echo "host_name=derek" >> $GITHUB_OUTPUT
            exit 0
          elif [ "$REQUESTED" = "lexie" ]; then
            echo "host_ssh=$LEXIE_SSH" >> $GITHUB_OUTPUT
            echo "host_name=lexie" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Auto-assign: hash the branch name to deterministically pick a host.
          BRANCH="${GITHUB_REF_NAME}"
          HASH=$(echo -n "$BRANCH" | md5sum | cut -c1-8)
          HASH_NUM=$((16#$HASH))
          if [ $((HASH_NUM % 2)) -eq 0 ]; then
            echo "host_ssh=$DEREK_SSH" >> $GITHUB_OUTPUT
            echo "host_name=derek" >> $GITHUB_OUTPUT
          else
            echo "host_ssh=$LEXIE_SSH" >> $GITHUB_OUTPUT
            echo "host_name=lexie" >> $GITHUB_OUTPUT
          fi
          echo "Branch '$BRANCH' -> host (hash=$HASH)"

  train:
    needs: assign-host
    runs-on: [self-hosted, parameter-golf]
    concurrency:
      group: mini-${{ needs.assign-host.outputs.host_name }}
      cancel-in-progress: false
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show assignment
        run: |
          echo "Branch: $GITHUB_REF_NAME"
          echo "Host: ${{ needs.assign-host.outputs.host_name }}"

      - name: Ensure shared dirs and venv (local)
        run: |
          sudo mkdir -p "$PG_ROOT" && sudo chown "$(whoami)" "$PG_ROOT"
          mkdir -p "$PG_WORK" "$PG_DATA"

          if command -v /opt/homebrew/bin/python3.12 &>/dev/null; then
            PY=/opt/homebrew/bin/python3.12
          elif command -v python3.12 &>/dev/null; then
            PY=python3.12
          else
            PY=python3
          fi

          if [ ! -d "$PG_VENV" ]; then
            $PY -m venv "$PG_VENV"
          fi
          source "$PG_VENV/bin/activate"
          pip install --upgrade pip
          pip install --upgrade mlx numpy sentencepiece huggingface-hub datasets tqdm zstandard

      - name: Sync code and data to target host
        env:
          TARGET: ${{ needs.assign-host.outputs.host_ssh }}
        run: |
          source "$PG_VENV/bin/activate"
          CHECKOUT_DIR="$(pwd)"

          echo "--- Syncing to ${{ needs.assign-host.outputs.host_name }} ---"
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 "$TARGET" \
            "sudo mkdir -p /opt/parameter-golf && sudo chown \$(whoami) /opt/parameter-golf && mkdir -p /opt/parameter-golf/work /opt/parameter-golf/data"

          rsync -az --delete \
            --exclude '.git' --exclude '.venv' --exclude 'data/datasets' --exclude 'data/tokenizers' --exclude 'logs' \
            -e "ssh -o StrictHostKeyChecking=no" \
            "$CHECKOUT_DIR/" "$TARGET:/opt/parameter-golf/work/"

          ssh -o StrictHostKeyChecking=no "$TARGET" '
            PG=/opt/parameter-golf
            if command -v /opt/homebrew/bin/python3.12 &>/dev/null; then
              PY=/opt/homebrew/bin/python3.12
            elif command -v python3.12 &>/dev/null; then
              PY=python3.12
            else
              PY=python3
            fi
            if [ ! -d $PG/venv ]; then
              $PY -m venv $PG/venv
              source $PG/venv/bin/activate
              pip install --upgrade pip
              pip install mlx numpy sentencepiece huggingface-hub datasets tqdm zstandard
            fi
            source $PG/venv/bin/activate
            if [ ! -d $PG/data/fineweb10B_sp1024 ]; then
              cd $PG/work
              python3 data/cached_challenge_fineweb.py --variant sp1024 --train-shards 10
              mv ./data/datasets/fineweb10B_sp1024 $PG/data/
              cp -r ./data/tokenizers $PG/data/ 2>/dev/null || true
            fi
            mkdir -p $PG/work/data/datasets
            ln -sfn $PG/data/fineweb10B_sp1024 $PG/work/data/datasets/fineweb10B_sp1024
            if [ -d $PG/data/tokenizers ]; then
              ln -sfn $PG/data/tokenizers $PG/work/data/tokenizers
            fi
          '

          # Also sync locally
          rsync -a --delete \
            --exclude '.git' --exclude '.venv' --exclude 'data/datasets' --exclude 'data/tokenizers' --exclude 'logs' \
            "$CHECKOUT_DIR/" "$PG_WORK/"
          mkdir -p "$PG_WORK/data/datasets"
          if [ ! -d "$PG_DATA/fineweb10B_sp1024" ]; then
            cd "$PG_WORK"
            python3 data/cached_challenge_fineweb.py --variant sp1024 --train-shards 10
            mv ./data/datasets/fineweb10B_sp1024 "$PG_DATA/"
            cp -r ./data/tokenizers "$PG_DATA/" 2>/dev/null || true
            cd "$CHECKOUT_DIR"
          fi
          ln -sfn "$PG_DATA/fineweb10B_sp1024" "$PG_WORK/data/datasets/fineweb10B_sp1024"
          if [ -d "$PG_DATA/tokenizers" ]; then
            ln -sfn "$PG_DATA/tokenizers" "$PG_WORK/data/tokenizers"
          fi

      - name: Train (single host)
        env:
          PYTHONUNBUFFERED: "1"
          TARGET: ${{ needs.assign-host.outputs.host_ssh }}
        run: |
          set -o pipefail
          source "$PG_VENV/bin/activate"

          RUN_ID="${{ inputs.run_id || github.sha }}"
          ITERATIONS="${{ inputs.iterations || '200' }}"
          BATCH="${{ inputs.train_batch_tokens || '8192' }}"

          echo "Running on ${{ needs.assign-host.outputs.host_name }} — single host mode"

          ssh -o StrictHostKeyChecking=no "$TARGET" "
            source /opt/parameter-golf/venv/bin/activate
            cd /opt/parameter-golf/work
            export RUN_ID='$RUN_ID'
            export ITERATIONS='$ITERATIONS'
            export TRAIN_BATCH_TOKENS='$BATCH'
            export VAL_LOSS_EVERY=0
            export VAL_BATCH_SIZE=8192
            export GRAD_ACCUM_STEPS=1
            export MLX_MAX_MICROBATCH_TOKENS=4096
            export PYTHONUNBUFFERED=1
            python3 -u train_gpt_mlx.py
          "

      - name: Collect and summarize
        if: always()
        env:
          TARGET: ${{ needs.assign-host.outputs.host_ssh }}
        run: |
          mkdir -p ./logs
          scp -o StrictHostKeyChecking=no "$TARGET:/opt/parameter-golf/work/logs/*.txt" ./logs/ 2>/dev/null || true
          LOG=$(ls ./logs/*.txt 2>/dev/null | head -1)

          if [ -z "$LOG" ]; then
            echo "No training log found"
            exit 0
          fi

          echo ""
          echo "========== RESULTS (${{ needs.assign-host.outputs.host_name }}) =========="
          grep -E "^model_params:|^iterations:|^optimizer:" "$LOG" 2>/dev/null || true
          echo "---"
          grep -E "^step:(1|10)/|^step:.*train_loss.*step_avg" "$LOG" | tail -3
          echo "---"
          grep -E "^step:.*val_loss.*val_bpb" "$LOG" 2>/dev/null || true
          grep -E "^saved_model:|^serialized_model|^final_" "$LOG" 2>/dev/null || true
          grep -E "^stopping_early|^swa:" "$LOG" 2>/dev/null || true
          echo "============================="

          {
            echo "## Training Results (${{ needs.assign-host.outputs.host_name }})"
            echo '```'
            grep -E "^step:.*val_bpb|^final_" "$LOG" 2>/dev/null || echo "val_bpb not yet available"
            grep -E "^serialized_model|^swa:" "$LOG" 2>/dev/null || true
            echo ""
            echo "Steps: $(grep -c '^step:' "$LOG") | $(grep '^step:' "$LOG" | tail -1)"
            echo '```'
          } >> $GITHUB_STEP_SUMMARY

      - name: Upload training log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: train-log-${{ needs.assign-host.outputs.host_name }}-${{ github.sha }}
          path: logs/

      - name: Cleanup
        if: always()
        env:
          TARGET: ${{ needs.assign-host.outputs.host_ssh }}
        run: |
          ssh -o StrictHostKeyChecking=no -o ConnectTimeout=10 "$TARGET" \
            "rm -rf /opt/parameter-golf/work/logs" 2>/dev/null || true
          rm -rf "$PG_WORK/logs"
